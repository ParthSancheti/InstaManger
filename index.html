<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Advanced Prompt Editor</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --glass-bg: rgba(30, 30, 30, 0.45);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-color: #f0f0f0;
            --accent: #3a82f6;
        }
        
        body {
            background-color: #050505;
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Breathing Light */
        .ambient-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 130vw;
            height: 130vw;
            background: radial-gradient(circle, rgba(58, 130, 246, 0.12) 0%, rgba(0, 0, 0, 0) 65%);
            transform: translate(-50%, -50%);
            animation: breathe 5s ease-in-out infinite alternate;
            z-index: 1;
            pointer-events: none;
        }

        @keyframes breathe {
            0% { transform: translate(-50%, -50%) scale(0.85); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
        }

        /* Main App Container */
        .app-wrapper {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            height: 100%;
            gap: 16px;
        }

        /* Glassmorphism Editor Container */
        .editor-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 16px 40px rgba(0,0,0,0.6);
            overflow: hidden;
        }

        /* Header area */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid var(--glass-border);
        }

        .header-title {
            font-size: 13px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .char-count {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            font-variant-numeric: tabular-nums;
        }

        /* Editor Layout (Line numbers + Textarea) */
        .editor-body {
            display: flex;
            flex-grow: 1;
            position: relative;
            overflow: hidden; /* Contains the internal scroll */
        }

        /* Line Numbers */
        .line-numbers {
            width: 40px;
            padding: 16px 8px 16px 0;
            background: rgba(0, 0, 0, 0.15);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            text-align: right;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.3);
            user-select: none;
            overflow: hidden; /* Scrolled via JS */
        }

        /* The actual text area */
        textarea {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            line-height: 1.6;
            padding: 16px;
            resize: none;
            outline: none;
            overflow-y: auto;
            white-space: pre; /* Prevents soft-wrapping so line numbers align perfectly */
        }

        textarea::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        /* Scrollbar Styling for iOS/Web */
        textarea::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        textarea::-webkit-scrollbar-track {
            background: transparent;
        }
        textarea::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        /* Action Buttons */
        .action-row {
            display: flex;
            gap: 12px;
        }

        .btn {
            position: relative;
            z-index: 2;
            border-radius: 18px;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-clear {
            background: rgba(255, 59, 48, 0.15);
            border: 1px solid rgba(255, 59, 48, 0.3);
            color: #ff453a;
            flex: 1;
        }

        .btn-save {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid var(--glass-border);
            color: #ffffff;
            flex: 3;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .btn-save.glow {
            background: rgba(58, 130, 246, 0.25);
            border-color: rgba(58, 130, 246, 0.5);
        }
    </style>
</head>
<body>

    <div class="ambient-glow"></div>

    <div class="app-wrapper">
        <div class="editor-container">
            <div class="header">
                <span class="header-title" id="promptTitle">Editor</span>
                <span class="char-count" id="charCount">0/5000</span>
            </div>
            <div class="editor-body">
                <div class="line-numbers" id="lineNumbers">1</div>
                <textarea id="promptEditor" placeholder="Type your prompt here..."></textarea>
            </div>
        </div>

        <div class="action-row">
            <div class="btn btn-clear" id="clearBtn">Clear</div>
            <div class="btn btn-save glow" id="saveBtn">Save Prompt</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); 
        tg.ready();

        const urlParams = new URLSearchParams(window.location.search);
        const promptKey = urlParams.get('key');
        const promptText = urlParams.get('text');

        const titleEl = document.getElementById('promptTitle');
        const editor = document.getElementById('promptEditor');
        const lineNumbers = document.getElementById('lineNumbers');
        const charCount = document.getElementById('charCount');
        const saveBtn = document.getElementById('saveBtn');
        const clearBtn = document.getElementById('clearBtn');

        const MAX_CHARS = 5000;

        // Initialize Data
        if (promptKey) titleEl.innerText = promptKey.replace('prompt_', '').toUpperCase();
        if (promptText) {
            editor.value = decodeURIComponent(promptText);
        }

        // Feature 1: Sync Line Numbers
        function updateLineNumbers() {
            const lines = editor.value.split('\n').length;
            let numbersHtml = '';
            for (let i = 1; i <= lines; i++) {
                numbersHtml += i + '<br>';
            }
            lineNumbers.innerHTML = numbersHtml;
        }

        // Feature 2: Sync Scrolling
        editor.addEventListener('scroll', () => {
            lineNumbers.scrollTop = editor.scrollTop;
        });

        // Feature 3: Update Live Character Count
        function updateMetrics() {
            const currentLength = editor.value.length;
            charCount.innerText = `${currentLength}/${MAX_CHARS}`;
            
            if (currentLength > MAX_CHARS) {
                charCount.style.color = '#ff453a';
                saveBtn.classList.remove('glow');
            } else {
                charCount.style.color = 'rgba(255, 255, 255, 0.4)';
                saveBtn.classList.add('glow');
            }
        }

        // Listen for typing events
        editor.addEventListener('input', () => {
            updateLineNumbers();
            updateMetrics();
            if (Math.random() > 0.7 && tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
        });

        // Initial setup calls
        updateLineNumbers();
        updateMetrics();

        // Feature 4: Clear Button
        clearBtn.addEventListener('click', () => {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            editor.value = '';
            updateLineNumbers();
            updateMetrics();
            editor.focus();
        });

        // Save & Send back to Python
        saveBtn.addEventListener('click', () => {
            if (editor.value.length > MAX_CHARS) {
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                tg.showAlert('Prompt exceeds 5000 characters!');
                return;
            }

            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');
            
            const payload = {
                action: 'save_prompt',
                key: promptKey,
                value: editor.value
            };

            tg.sendData(JSON.stringify(payload));
        });
    </script>
</body>
</html>
