<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Prompt Editor</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --glass-bg: rgba(30, 30, 30, 0.4);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Breathing Light */
        .ambient-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 120vw;
            height: 120vw;
            background: radial-gradient(circle, rgba(58, 130, 246, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            transform: translate(-50%, -50%);
            animation: breathe 4s ease-in-out infinite alternate;
            z-index: 1;
            pointer-events: none;
        }

        @keyframes breathe {
            0% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.6; }
            100% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
        }

        /* Glassmorphism Floating UI */
        .editor-container {
            position: relative;
            z-index: 2;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .header {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        textarea {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 16px;
            line-height: 1.6;
            resize: none;
            outline: none;
            font-family: inherit;
        }

        textarea::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        /* Soft iOS Button */
        .btn-save {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 18px;
            color: #ffffff;
            font-size: 17px;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-save:active {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="ambient-glow"></div>

    <div class="editor-container">
        <div class="header" id="promptTitle">Editing Prompt</div>
        <textarea id="promptEditor" placeholder="Start typing your prompt here..."></textarea>
    </div>

    <div class="btn-save" id="saveBtn">Save Configuration</div>

    <script>
        // Init Telegram Web App API
        const tg = window.Telegram.WebApp;
        tg.expand(); // Force full screen mode
        tg.ready();

        // Get Data from Bot via URL Params
        const urlParams = new URLSearchParams(window.location.search);
        const promptKey = urlParams.get('key');
        const promptText = urlParams.get('text');

        // Set UI
        if (promptKey) {
            document.getElementById('promptTitle').innerText = `Editing: ${promptKey}`;
        }
        
        const editor = document.getElementById('promptEditor');
        if (promptText) {
            editor.value = decodeURIComponent(promptText);
        }

        // Haptics Trigger Helper
        function softHaptic() {
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
        }

        // Add haptics to typing (optional, gives that premium feel)
        editor.addEventListener('input', () => {
            // Throttling haptics slightly so it doesn't overwhelm
            if(Math.random() > 0.5) softHaptic(); 
        });

        // Save & Send back to Python
        document.getElementById('saveBtn').addEventListener('click', () => {
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }
            
            const payload = {
                action: 'save_prompt',
                key: promptKey,
                value: editor.value
            };

            // This sends the data back to your aiogram @router.message(F.web_app_data) handler
            tg.sendData(JSON.stringify(payload));
        });
    </script>
</body>
</html>
